name: Sync next-deploy branch

on:
  push:
    branches:
      - main
    paths:
      - next-app/**
      - .github/workflows/sync-next-deploy.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-next-deploy
  cancel-in-progress: true

jobs:
  sync:
    name: Publish next-app to next-deploy branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build deploy tree (root + next-app)
        run: |
          rm -rf /tmp/next-deploy
          mkdir -p /tmp/next-deploy/next-app
          # ไม่ copy .github — GITHUB_TOKEN ไม่มีสิทธิ์ push workflow ไป branch อื่น
          rsync -a --exclude='.github' next-app/ /tmp/next-deploy/
          rsync -a --exclude='.github' next-app/ /tmp/next-deploy/next-app/
          cat > /tmp/next-deploy/DEPLOY_BRANCH.txt <<'EOF'
          Branch สำหรับ Vercel deploy โดยตรง
          - Root Directory ว่าง (./) หรือ next-app ใช้ได้ทั้งคู่
          - Production Branch ตั้งเป็น next-deploy
          EOF

      - name: Push to next-deploy branch
        run: |
          cd /tmp/next-deploy
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "deploy: sync next-app from ${GITHUB_SHA::7}"
          git branch -M next-deploy
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" next-deploy
