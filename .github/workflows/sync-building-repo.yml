name: Sync to Building repo

on:
  push:
    branches:
      - main
    paths:
      - next-app/**
      - .github/workflows/sync-building-repo.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-building-repo
  cancel-in-progress: true

jobs:
  sync:
    name: Push next-app to t9charoen-max/Building
    if: ${{ secrets.BUILDING_REPO_TOKEN != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Prepare standalone tree
        run: |
          rm -rf /tmp/building-repo
          mkdir -p /tmp/building-repo
          cp -a next-app/. /tmp/building-repo/
          cat > /tmp/building-repo/REPO_INFO.txt <<'EOF'
          Repo: t9charoen-max/Building
          สร้างอัตโนมัติจาก rachawei/next-app
          Deploy Vercel: Root Directory = ./ , Framework = Next.js
          GitHub Pages: https://t9charoen-max.github.io/Building/
          EOF

      - name: Push to Building repository
        env:
          BUILDING_TOKEN: ${{ secrets.BUILDING_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/building-repo
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "sync: next-app from rachawei@${GITHUB_SHA::7}"
          git branch -M main
          git remote add origin "https://x-access-token:${BUILDING_TOKEN}@github.com/t9charoen-max/Building.git"
          git push --force origin main
